<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dull Dull Secure Exam Editor</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f3f3f3" id="theme-meta">

    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src 'self' 'unsafe-inline';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data:;
            manifest-src 'self';
            connect-src 'self';
            worker-src 'self';
            object-src 'none';
            base-uri 'none';
            frame-ancestors 'none';
            form-action 'none';
            upgrade-insecure-requests;
            block-all-mixed-content;
          ">

    <style>

/* Register local TrueType Fonts */
@font-face {
    font-family: 'Fira Mono';
    src: url('FiraMono-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'Roboto Slab';
    src: url('RobotoSlab-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}
        * { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg-main: #ffffff;
    --bg-bar: #f3f3f3;
    --border-color: #cecece;
    --text-main: #000000;
    --text-muted: #616161;
    --btn-bg: #007acc;
    --btn-hover: #0062a3;
    --control-txt: #333333;
}

/* Changed from .light-theme to .dark-theme */
.dark-theme { 
    --bg-main: #1e1e1e;
    --bg-bar: #252526;
    --border-color: #3c3c3c;
    --text-main: #d4d4d4;
    --text-muted: #858585;
    --btn-bg: #0e639c;
    --btn-hover: #1177bb;
    --control-txt: #ffffff;
}
        body, html { width: 100%; height: 100%; background-color: var(--bg-main); color: var(--text-main); font-family: 'Courier New', Courier, monospace; overflow: hidden; transition: background-color 0.15s, color 0.15s; }
        #editor-container { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #control-bar { background-color: var(--bg-bar); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); user-select: none; }
        .left-controls, .right-controls { display: flex; align-items: center; gap: 12px; }
        .status-text { font-size: 13px; color: var(--text-muted); }
        .btn { background-color: var(--btn-bg); color: white; border: none; padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 2px; }
        .btn:hover { background-color: var(--btn-hover); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--control-txt); }
        .btn-secondary:hover { background-color: var(--border-color); }
        select { background-color: var(--bg-main); color: var(--text-main); border: 1px solid var(--border-color); padding: 5px; font-family: inherit; font-size: 13px; outline: none; border-radius: 2px; }
        
        #editor { flex: 1; width: 100%; padding: 25px; border: none; resize: none; background-color: var(--bg-main); color: var(--text-main); font-family: 'Roboto Slab', serif; font-size: 16px; line-height: 1.6; outline: none; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; transition: background-color 0.15s, color 0.15s; }
        #info-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--bg-bar); border: 1px solid var(--border-color); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; min-width: 320px; }
        #info-overlay h3 { margin-bottom: 10px; color: var(--control-txt); font-size: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        #info-overlay p { font-size: 14px; margin: 8px 0; color: var(--text-main); }
        
        /* Keep print container flat and completely invisible during normal computer use */
        #print-mirror { display: none; }

        /* --- THE PRINT MEDIA ENGINE STYLESHEET RE-DESIGN --- */
        @media print {
            /* Hide application headers, utility bars, and tool buttons */
            #control-bar, #info-overlay, button, select, .status-text {
                display: none !important;
            }

            body, html, #editor-container {
                background-color: #ffffff !important;
                color: #000000 !important;
                overflow: visible !important;
                height: auto !important;
                width: auto !important;
                position: static !important;
            }

            /* Hard-kill the textarea layout so it takes up zero space on paper */
            #editor {
                display: none !important;
            }

            /* Expose the printing engine block container and force fluid page-breaks */
            #print-mirror {
                display: block !important;
                color: #000000 !important;
                background-color: #ffffff !important;
                font-family: 'Courier New', Courier, monospace !important;
                font-size: 12pt !important;
                line-height: 1.6 !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                position: static !important;
                white-space: pre-wrap !important;
                word-wrap: break-word !important;
            }
        }
    </style>
</head>
<body>

<div id="editor-container">
    <div id="control-bar">
        <div class="left-controls">
            <button class="btn" id="save-btn">Save As...</button>
            <button class="btn btn-secondary" id="print-btn">Print</button>
            <select id="font-size-select" title="Font Size">
                <option value="14px">Small Text</option>
                <option value="16px" selected>Normal Text</option>
                <option value="20px">Large Text</option>
                <option value="24px">Extra Large</option>
            </select>
<select id="font-family-select" title="Font Style">
    <option value="'Roboto Slab', serif" selected>Roboto Slab</option>
    <option value="'Courier New', Courier, monospace">Monospace</option>
    <option value="'Fira Mono', monospace">Fira Mono</option>
    <option value="Arial, Helvetica, sans-serif">Sans-Serif</option>
    <option value="'Times New Roman', Times, serif">Serif</option>
</select>
        </div>
        <div class="right-controls">
            <div class="status-text" id="battery-display">Battery: --</div>
            <button class="btn btn-secondary" id="theme-toggle">Toggle Theme</button>
        </div>
    </div>
    
    <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="none" autocomplete="off" placeholder="Begin typing your exam responses here..."></textarea>
    
    <div id="print-mirror"></div>
</div>

<div id="info-overlay">
    <h3>Document Statistics</h3>
    <p>Lines: <span id="line-count">1</span></p>
    <p>Characters: <span id="char-count">0</span></p>
    <p style="margin-top: 15px; font-size: 11px; color: var(--text-muted);">Press ESC again to close window.</p>
</div>

<script>
    const editor = document.getElementById('editor');
    const printMirror = document.getElementById('print-mirror');
    const saveBtn = document.getElementById('save-btn');
    const printBtn = document.getElementById('print-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const fontSizeSelect = document.getElementById('font-size-select');
    const fontFamilySelect = document.getElementById('font-family-select');
    const infoOverlay = document.getElementById('info-overlay');
    const batteryDisplay = document.getElementById('battery-display');
    const themeMeta = document.getElementById('theme-meta');

    // --- Native File System Access Engine (Save Dialog) ---
    async function saveDocumentWithDialog() {
        const textContent = editor.value;
        const options = {
            suggestedName: 'Exam_Submission.txt',
            types: [{
                description: 'Plain Text Files',
                accept: { 'text/plain': ['.txt'] }
            }]
        };
        try {
            const handle = await window.showSaveFilePicker(options);
            const writable = await handle.createWritable();
            await writable.write(textContent);
            await writable.close();
        } catch (err) {
            console.warn('Save operation cancelled or blocked:', err);
        }
    }

    // --- Session Resiliency Engine ---
    window.addEventListener('DOMContentLoaded', () => {
        const savedBackup = sessionStorage.getItem('exam_session_backup');
        if (savedBackup) {
            editor.value = savedBackup;
            printMirror.textContent = savedBackup; // Populate mirror layout container
            updateStats();
        }
    });

    // Handle character mapping allocations and mirrors
    function updateStatsAndBackup() {
        const text = editor.value;
        document.getElementById('char-count').textContent = text.length;
        document.getElementById('line-count').textContent = text.split('\n').length;
        
        // Push strings straight to session cache and the screen-printing target
        sessionStorage.setItem('exam_session_backup', text);
        printMirror.textContent = text;
    }

    // Dynamic typography adaptations for both the interactive textarea AND the print target
    fontSizeSelect.addEventListener('change', (e) => {
        editor.style.fontSize = e.target.value;
        printMirror.style.fontSize = e.target.value;
    });
    fontFamilySelect.addEventListener('change', (e) => {
        editor.style.fontFamily = e.target.value;
        printMirror.style.fontFamily = e.target.value;
    });

    // --- Battery Monitoring Pipeline ---
    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBatteryStatus() {
                const level = Math.round(battery.level * 100);
                const status = battery.charging ? '🔌 Charging' : '🔋 Discharging';
                batteryDisplay.textContent = `Battery: ${level}% (${status})`;
            }
            updateBatteryStatus();
            battery.addEventListener('levelchange', updateBatteryStatus);
            battery.addEventListener('chargingchange', updateBatteryStatus);
        });
    } else {
        batteryDisplay.style.display = 'none';
    }

// --- Theme Switching ---
themeToggle.addEventListener('click', () => {
    // Toggle dark-theme instead of light-theme
    document.body.classList.toggle('dark-theme');
    const isDark = document.body.classList.contains('dark-theme');
    
    // Dynamically adjust browser header bar colors
    themeMeta.setAttribute('content', isDark ? '#1e1e1e' : '#f3f3f3');
});

    // --- Print Execution ---
    printBtn.addEventListener('click', () => window.print());

    // --- Event Bindings ---
    saveBtn.addEventListener('click', saveDocumentWithDialog);
    editor.addEventListener('input', updateStatsAndBackup);

    function updateStats() {
        const text = editor.value;
        document.getElementById('char-count').textContent = text.length;
        document.getElementById('line-count').textContent = text.split('\n').length;
    }

    // --- Global Hotkey Intercepts ---
    window.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveDocumentWithDialog();
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            if (infoOverlay.style.display === 'block') {
                infoOverlay.style.display = 'none';
            } else {
                updateStats();
                infoOverlay.style.display = 'block';
            }
        }
    });

    // --- Service Worker Initialization ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .catch(err => console.error('Service Worker registration failed:', err));
        });
    }
</script>
</body>
</html>
