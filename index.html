<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DullDull Secure Exam Editor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e1e" id="theme-meta">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* CSS Variables to handle instant theme-switching */
        :root {
            --bg-main: #1e1e1e;
            --bg-bar: #252526;
            --border-color: #3c3c3c;
            --text-main: #d4d4d4;
            --text-muted: #858585;
            --btn-bg: #0e639c;
            --btn-hover: #1177bb;
            --control-txt: #ffffff;
        }

        .light-theme {
            --bg-main: #ffffff;
            --bg-bar: #f3f3f3;
            --border-color: #cecece;
            --text-main: #000000;
            --text-muted: #616161;
            --btn-bg: #007acc;
            --btn-hover: #0062a3;
            --control-txt: #333333;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            transition: background-color 0.15s, color 0.15s;
        }

        #editor-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #control-bar {
            background-color: var(--bg-bar);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            user-select: none;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        .btn {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            border-radius: 2px;
        }
        .btn:hover {
            background-color: var(--btn-hover);
        }
        
        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--control-txt);
        }
        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        select {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 5px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            border-radius: 2px;
        }

        #editor {
            flex: 1;
            width: 100%;
            padding: 25px;
            border: none;
            resize: none;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px; /* Default */
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            transition: background-color 0.15s, color 0.15s;
        }

        #info-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--bg-bar);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            min-width: 320px;
        }
        #info-overlay h3 {
            margin-bottom: 10px;
            color: var(--control-txt);
            font-size: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        #info-overlay p {
            font-size: 14px;
            margin: 8px 0;
            color: var(--text-main);
        }

        /* Print Media Stylesheet Overrides */
        @media print {
            #control-bar {
                display: none !important;
            }
            #editor {
                color: #000000 !important;
                background-color: #ffffff !important;
                font-size: 12pt !important;
                overflow: visible !important;
                height: auto !important;
            }
            body, html {
                background-color: #ffffff !important;
                color: #000000 !important;
                overflow: visible !important;
                height: auto !important;
            }
        }
    </style>
</head>
<body>

<div id="editor-container">
    <div id="control-bar">
        <div class="left-controls">
            <button class="btn" id="save-btn">Save As...</button>
            <button class="btn btn-secondary" id="print-btn">Print</button>
            
            <select id="font-size-select" title="Font Size">
                <option value="14px">Small Text</option>
                <option value="16px" selected>Normal Text</option>
                <option value="20px">Large Text</option>
                <option value="24px">Extra Large</option>
            </select>

            <select id="font-family-select" title="Font Style">
                <option value="'Courier New', Courier, monospace" selected>Monospace</option>
                <option value="Arial, Helvetica, sans-serif">Sans-Serif (Plain)</option>
                <option value="'Times New Roman', Times, serif">Serif</option>
            </select>
        </div>
        
        <div class="right-controls">
            <div class="status-text" id="battery-display">Battery: --</div>
            <button class="btn btn-secondary" id="theme-toggle">Toggle Theme</button>
        </div>
    </div>
    
    <textarea id="editor" 
              spellcheck="false" 
              autocorrect="off" 
              autocapitalize="none" 
              autocomplete="off" 
              placeholder="Begin typing your exam responses here..."></textarea>
</div>

<div id="info-overlay">
    <h3>Document Statistics</h3>
    <p>Lines: <span id="line-count">1</span></p>
    <p>Characters: <span id="char-count">0</span></p>
    <p style="margin-top: 15px; font-size: 11px; color: var(--text-muted);">Press ESC again to close window.</p>
</div>

<script>
    const editor = document.getElementById('editor');
    const saveBtn = document.getElementById('save-btn');
    const printBtn = document.getElementById('print-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const fontSizeSelect = document.getElementById('font-size-select');
    const fontFamilySelect = document.getElementById('font-family-select');
    const infoOverlay = document.getElementById('info-overlay');
    const batteryDisplay = document.getElementById('battery-display');
    const themeMeta = document.getElementById('theme-meta');

    // --- Native File System Access Engine (Save Dialog) ---
    async function saveDocumentWithDialog() {
        const textContent = editor.value;
        
        const options = {
            suggestedName: 'Exam_Submission.txt',
            types: [{
                description: 'Plain Text Files',
                accept: { 'text/plain': ['.txt'] }
            }]
        };

        try {
            // Spawns native OS Save Dialog Box
            const handle = await window.showSaveFilePicker(options);
            const writable = await handle.createWritable();
            await writable.write(textContent);
            await writable.close();
        } catch (err) {
            // Catches user cancellations or security exceptions gracefully
            console.warn('Save operations modified or aborted by user:', err);
        }
    }

    // --- Battery Monitoring Pipeline ---
    if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            function updateBatteryStatus() {
                const level = Math.round(battery.level * 100);
                const status = battery.charging ? '🔌 Charging' : '🔋 Discharging';
                batteryDisplay.textContent = `Battery: ${level}% (${status})`;
            }
            
            updateBatteryStatus();
            // Attach hardware state changes listeners
            battery.addEventListener('levelchange', updateBatteryStatus);
            battery.addEventListener('chargingchange', updateBatteryStatus);
        });
    } else {
        batteryDisplay.style.display = 'none'; // Clear if target machine lacks battery profile
    }

    // --- Formatting Alteration Mechanics ---
    fontSizeSelect.addEventListener('change', (e) => {
        editor.style.fontSize = e.target.value;
    });

    fontFamilySelect.addEventListener('change', (e) => {
        editor.style.fontFamily = e.target.value;
    });

    // --- Theme Switching Toggles ---
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        const isLight = document.body.classList.contains('light-theme');
        themeMeta.setAttribute('content', isLight ? '#f3f3f3' : '#1e1e1e');
    });

    // --- Native Print Engine Binding ---
    printBtn.addEventListener('click', () => {
        window.print();
    });

    // --- Document Metrics Engine ---
    function updateStats() {
        const text = editor.value;
        document.getElementById('char-count').textContent = text.length;
        document.getElementById('line-count').textContent = text.split('\n').length;
    }

    saveBtn.addEventListener('click', saveDocumentWithDialog);
    editor.addEventListener('input', updateStats);

    // --- Global Hotkey Intercept Layer ---
    window.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveDocumentWithDialog();
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            if (infoOverlay.style.display === 'block') {
                infoOverlay.style.display = 'none';
            } else {
                updateStats();
                infoOverlay.style.display = 'block';
            }
        }
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
        });
    }
</script>
</body>
</html>
